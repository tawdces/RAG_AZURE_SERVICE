name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.14']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio

    - name: Lint with pylint
      run: |
        pip install pylint
        pylint src/ scripts/ --fail-under=7.0 || true
      continue-on-error: true

    - name: Check code formatting with black
      run: |
        pip install black
        black --check src/ scripts/ tests/ || true
      continue-on-error: true

    - name: Run tests with pytest
      env:
        PYTHONPATH: .

        PROJECT_ENDPOINT: ${{ secrets.PROJECT_ENDPOINT }}
        PROJECT_API_KEY: ${{ secrets.PROJECT_API_KEY }}

        AZURE_STORAGE_CONTAINER_NAME: ${{ secrets.AZURE_STORAGE_CONTAINER_NAME }}
        AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}

        AZURE_SEARCH_ENDPOINT: ${{ secrets.AZURE_SEARCH_ENDPOINT }}
        AZURE_SEARCH_INDEX_NAME: ${{ secrets.AZURE_SEARCH_INDEX_NAME }}
        AZURE_SEARCH_INDEXER_NAME: ${{ secrets.AZURE_SEARCH_INDEXER_NAME }}
        AZURE_SEARCH_API_KEY: ${{ secrets.AZURE_SEARCH_API_KEY }}

        KNOWLEDGE_BASE_NAME: ${{ secrets.KNOWLEDGE_BASE_NAME }}
        KNOWLEDGE_SOURCE_NAME: ${{ secrets.KNOWLEDGE_SOURCE_NAME }}

      run: |
        pytest tests/ -v --cov=src --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
        verbose: true


  security:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit

    - name: Run security check with bandit
      run: |
        bandit -r src/ scripts/ -f json -o bandit-report.json || true
      continue-on-error: true